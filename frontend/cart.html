<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - Digital Uddan</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="header" id="header"></header>
  <main class="container">
    <h1 class="page-title">Your Cart</h1>
    <div id="cartList"></div>
    <div id="cartFoot"></div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    function emojiFor(name) {
      const lower = (name || '').toLowerCase();
      if (lower.includes('apple')) return '🍎';
      if (lower.includes('banana')) return '🍌';
      if (lower.includes('mango')) return '🥭';
      if (lower.includes('grape')) return '🍇';
      if (lower.includes('tomato')) return '🍅';
      if (lower.includes('carrot')) return '🥕';
      if (lower.includes('potato')) return '🥔';
      if (lower.includes('onion')) return '🧅';
      return '🛒';
    }

    function render() {
      const list = document.getElementById('cartList');
      const foot = document.getElementById('cartFoot');
      const cart = getCart();
      if (!cart.length) {
        list.innerHTML = `<div class="empty"><div class="icon">🛒</div>Your cart is empty. <a href="/index.html" style="color:var(--green);font-weight:600">Browse products →</a></div>`;
        foot.innerHTML = '';
        return;
      }
      list.innerHTML = cart.map(it => `
        <div class="cart-row">
          <div class="img">${emojiFor(it.name)}</div>
          <div class="info">
            <div style="font-weight:700">${escapeHtml(it.name)}</div>
            <div style="font-size:13px;color:var(--muted)">₹${it.price} per ${escapeHtml(it.unit)}</div>
          </div>
          <div class="qty-ctrl">
            <button onclick="changeQty(${it.product_id},-1)">−</button>
            <span>${it.quantity}</span>
            <button onclick="changeQty(${it.product_id},1)">+</button>
          </div>
          <div style="font-weight:700;min-width:80px;text-align:right">₹${(it.price*it.quantity).toFixed(2)}</div>
        </div>
      `).join('');
      const total = cart.reduce((s,i) => s + i.price * i.quantity, 0);
      foot.innerHTML = `
        <div class="cart-foot">
          <div><div style="font-size:13px;color:var(--muted)">Total</div><div style="font-size:24px;font-weight:800">₹${total.toFixed(2)}</div></div>
          <button class="btn" style="width:auto;padding:12px 28px" onclick="checkout()">Place Order</button>
        </div>
      `;
    }

    function changeQty(id, delta) {
      const cart = getCart();
      const it = cart.find(i => i.product_id === id);
      if (!it) return;
      it.quantity += delta;
      const next = it.quantity <= 0 ? cart.filter(i => i.product_id !== id) : cart;
      setCart(next);
      render();
    }

    async function checkout() {
      const user = getUser();
      if (!user) { window.location.href = '/login.html?next=/cart.html'; return; }
      if (user.role !== 'customer') { toast('Sellers cannot place orders'); return; }
      const cart = getCart();
      try {
        await api('/orders', {
          method: 'POST',
          body: JSON.stringify({ items: cart.map(i => ({ product_id: i.product_id, quantity: i.quantity })) }),
        });
        setCart([]);
        toast('Order placed!');
        setTimeout(() => window.location.href = '/index.html', 800);
      } catch (e) {
        toast('Failed: ' + e.message);
      }
    }

    renderHeader({ showSearch: false });
    render();
  </script>
</body>
</html>
